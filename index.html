<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NiyaB</title>
  <link rel="stylesheet" href="style.css" />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="intro-active">
  <div id="intro-screen">
    <canvas id="intro-stars"></canvas>
    <div class="intro-content">
      <div class="intro-logo">Loading..</div>
      <div class="intro-loading">
        <div class="intro-progress">
          <div class="intro-progress-fill" id="intro-progress-fill"></div>
        </div>
        <div class="intro-percent" id="intro-percent">0%</div>
      </div>
      <div class="intro-text">Initializing profile...</div>
    </div>
  </div>

  <div class="card">
    <div class="avatar-box">
      <img src="avatar.jpg" alt="Avatar" class="avatar" />
    </div>

    <h1>NiyaB</h1>
    <p class="job">Vibe Coding</p>

    <p>
      I Love Iroha And You.
    </p>

    <a href="https://discord.com/users/874844595635249185" target="_blank" class="discord">
      <i class="fa-brands fa-discord"></i>
    </a>
  </div>

  <div class="music-player">
    <img src="cover1.jpg" class="cover" id="cover" alt="cover">

    <div class="info">
      <div class="title" id="title">Her - JVKE</div>

      <div class="time-row">
        <span id="current">0:00</span>
        <input type="range" id="progress" value="0" min="0">
        <span id="duration">0:00</span>
      </div>

      <div class="controls">
        <button id="prev">⏮</button>
        <button id="play">▶</button>
        <button id="next">⏭</button>
      </div>
    </div>
  </div>

  <audio id="bg-music" preload="auto" playsinline></audio>

  <script src="script.js"></script>
  <script src="intro.js"></script>
</body>
</html>
